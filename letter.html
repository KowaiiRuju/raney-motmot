<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letter</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <button class="envelope-btn" onclick="openLetter()">
        <i class="fa-solid fa-envelope-open-heart"></i> Open Letter
    </button>
    
    <div id="letter-cont" class="lightbox-overlay">
        <div class="lightbox-content">
            <button class="close-btn" onclick="closeLetter()"><i class="fa-solid fa-xmark"></i></button>
            <img src="us.jpg" alt="us" style="width: 150px; height: 150px; object-fit: cover; border-radius: 50%; margin-bottom: 20px; border: 4px solid #ffe6ea;">
            <h1>Happy Monthsary my love</h1>
            <p style="font-size: 1.1em; line-height: 1.6; color: #555;">Lorem ipsum dolor sit amet consectetur adipisicing elit. Quisquam, quod.</p>
            
            <p class="codepen" data-height="300" data-pen-title="CSS Rose" data-default-tab="html,result" data-slug-hash="RVWJaj" data-user="svebal" style="height: 300px; box-sizing: border-box; display: flex; align-items: center; justify-content: center; border: 2px solid #ffe6ea; border-radius: 10px; margin: 1em 0; padding: 1em; background: #fff;">
              <span>See the Pen <a href="https://codepen.io/svebal/pen/RVWJaj">
              CSS Rose</a> by Sven Balzer (<a href="https://codepen.io/svebal">@svebal</a>)
              on <a href="https://codepen.io">CodePen</a>.</span>
            </p>
            <script async src="https://public.codepenassets.com/embed/index.js"></script>
        </div>
    </div>

    <script>
        function openLetter(){
            document.getElementById('letter-cont').classList.add('active');
        }
        function closeLetter(){
            document.getElementById('letter-cont').classList.remove('active');
        }
    </script>
</body>
</html>
