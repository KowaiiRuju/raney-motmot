<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthsarry Letter</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1>For You</h1>
        <img src="us.jpg" alt="us" style="width: 180px; height: 180px;">
        <form>
            <label for="password">Our Secret Password</label>
            <input type="text" name="password" id="password" placeholder="Enter password">
            <button type="button" onclick="checkPass()"><i class="fa-solid fa-unlock-keyhole"></i> Unlock</button>
        </form>
    </div>

    <script>
        function checkPass(){
            const password = document.getElementById('password').value;
            if (password === '112425'){
                window.location.href= 'letter.html';
            }else{
                alert('Ngi kalimot dayon 💔')
            }
        }
    </script>
</body>
</html>
