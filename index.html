<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthsarry Letter</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1>For You</h1>
        <img src="us.jpg" alt="us" style="width: 180px; height: 180px;">
        <form onsubmit="event.preventDefault(); checkPass();">
            <label for="password">Our Secret Password</label>
            <input type="text" name="password" id="password" placeholder="Enter password">
            <button type="submit"><i class="fa-solid fa-unlock-keyhole"></i> Unlock</button>
        </form>
    </div>

    <!-- Countdown Overlay -->
    <div id="countdown-overlay" class="countdown-overlay" style="display: none;">
        <div class="countdown-content">
            <i class="fa-solid fa-clock countdown-icon"></i>
            <h2>SOON TO OPEN</h2>
            <p>Our special moment will unlock in:</p>
            <div id="countdown-timer" class="countdown-timer">
                <div class="time-box"><span id="days">00</span><small>Days</small></div>
                <div class="time-box"><span id="hours">00</span><small>Hours</small></div>
                <div class="time-box"><span id="minutes">00</span><small>Mins</small></div>
                <div class="time-box"><span id="seconds">00</span><small>Secs</small></div>
            </div>
        </div>
    </div>

    <script>
        function checkPass(){
            const password = document.getElementById('password').value;
            if (password === '112425'){
                window.location.href= 'letter.html';
            }else{
                alert('Ngi kalimot dayon 💔')
            }
        }
        
        function updateCountdown() {
            // Target date: Mar 24, 2026 00:00:00 (Philippine Time - GMT+8)
            const targetDate = new Date('2026-03-24T00:00:00+08:00').getTime();
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance > 0) {
                document.getElementById('countdown-overlay').style.display = 'flex';
                
                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                document.getElementById('days').innerText = days.toString().padStart(2, '0');
                document.getElementById('hours').innerText = hours.toString().padStart(2, '0');
                document.getElementById('minutes').innerText = minutes.toString().padStart(2, '0');
                document.getElementById('seconds').innerText = seconds.toString().padStart(2, '0');
            } else {
                document.getElementById('countdown-overlay').style.display = 'none';
            }
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
